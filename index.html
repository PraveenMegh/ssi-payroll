  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; color: #111827; }

    /* ── Layout ── */
    #login-screen  { min-height:100vh; display:flex; align-items:center; justify-content:center; }
    #login-screen.hidden { display:none !important; }
    #login-right { /* right panel */ }
    #app-shell     { display:none; height:100vh; overflow:hidden; }
    #app-shell.visible { display:flex; }
    #sidebar       { width:240px; background:linear-gradient(180deg,#8B1A1A,#C0392B); color:#fff; display:flex; flex-direction:column; height:100vh; overflow-y:auto; flex-shrink:0; }
    #main-content  { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    #app-area      { flex:1; overflow-y:auto; padding:1.5rem; }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: .75rem;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      margin-bottom: 1.25rem;
    }

    /* ── Stat card ── */
    .stat-card {
      background: #fff;
      border-radius: .75rem;
      padding: 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }

    /* ── Info card ── */
    .info-card {
      background: #f8fafc;
      border-radius: .5rem;
      padding: .75rem 1rem;
      border: 1px solid #e2e8f0;
      font-size: .9rem;
    }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: .75rem;
    }
    .page-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #8B1A1A;
    }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .875rem;
    }
    table thead tr { background: #C0392B; }
    table th {
      padding: .6rem 1rem;
      text-align: left;
      color: #fff;
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 600;
    }
    table td {
      padding: .6rem 1rem;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
      color: #374151;
    }
    table tbody tr:hover td { background: #fef2f2; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .5rem 1rem;
      border: none;
      border-radius: .5rem;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      text-decoration: none;
    }
    .btn:hover   { opacity: .88; }
    .btn:active  { transform: scale(.97); }
    .btn-primary   { background: #C0392B; color: #fff; }
    .btn-secondary { background: #e2e8f0; color: #374151; }
    .btn-success   { background: #16a34a; color: #fff; }
    .btn-danger    { background: #dc2626; color: #fff; }
    .btn-warning   { background: #d97706; color: #fff; }
    .btn-sm        { padding: .3rem .75rem; font-size: .8rem; }

    /* ── Forms ── */
    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .35rem;
    }
    input, select, textarea {
      width: 100%;
      padding: .55rem .85rem;
      border: 1.5px solid #d1d5db;
      border-radius: .5rem;
      font-size: .875rem;
      color: #111827;
      background: #fff;
      transition: border-color .15s;
      outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: #00897b; }
    .form-grid   { display: grid; gap: 1rem; }
    .form-grid-2 { grid-template-columns: 1fr 1fr; }
    .form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
    @media (max-width: 600px) { .form-grid-2 { grid-template-columns: 1fr; } }

    /* ── Modal ── */
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid #f1f5f9;
    }
    .modal-body   { padding: 1.25rem 1.5rem; }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: .75rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid #f1f5f9;
      background: #f8fafc;
      border-radius: 0 0 1rem 1rem;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: .2rem .65rem;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .03em;
    }
    .badge-ok         { background: #dcfce7; color: #166534; }
    .badge-low        { background: #fee2e2; color: #991b1b; }
    .badge-urgent     { background: #fee2e2; color: #991b1b; }
    .badge-draft      { background: #f1f5f9; color: #475569; }
    .badge-submitted  { background: #fef3c7; color: #b45309; }
    .badge-dispatched { background: #dcfce7; color: #166534; }
    .badge-cancelled  { background: #fee2e2; color: #991b1b; }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
      color: #94a3b8;
    }
    .empty-state .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .empty-state p     { font-size: 1rem; font-weight: 500; }

    /* ── Sync badge ── */
    #sync-badge {
      position: fixed; top: 8px; right: 12px;
      background: #22c55e; color: #fff;
      font-size: .7rem; padding: 3px 10px;
      border-radius: 999px; z-index: 999;
      opacity: 0; transition: opacity .4s;
      pointer-events: none;
    }
    #sync-badge.show { opacity: 1; }

    /* ── Sidebar nav active ── */
    [data-nav].active {
      background: rgba(255,255,255,.18) !important;
      border-left: 3px solid #fff !important;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #sidebar { position:fixed; z-index:40; transform:translateX(-100%); transition:transform .3s; }
      #sidebar.open { transform:translateX(0); }
      #app-area { padding: 1rem; }
      .form-grid-2 { grid-template-columns: 1fr; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #F1948A; border-radius: 99px; }

    /* ══════════════════════════════════════════════
       Login Page — SSI Crimson & White Theme
       ══════════════════════════════════════════════ */

    /* ── Full-page WHITE background ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      padding: 2rem 1rem;
      position: relative;
      overflow: hidden;
    }
    #login-screen.hidden { display: none !important; }

    /* ── Subtle crimson dot texture overlay ── */
    #login-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(192,57,43,.06) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
    }

    /* ── Large soft crimson blobs for depth ── */
    #login-screen::after {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(192,57,43,.10) 0%, transparent 70%);
      top: -150px;
      left: -150px;
      pointer-events: none;
    }

    /* ── Card wrapper ── */
    #login-card-wrapper {
      position: relative;
      width: 100%;
      max-width: 420px;
      animation: loginFadeUp .55s ease-out;
      z-index: 1;
    }

    @keyframes loginFadeUp {
      from { opacity:0; transform:translateY(28px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Crimson geo accent card behind white card ── */
    #login-geo-back {
      position: absolute;
      top: -18px;
      right: -18px;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #C0392B 0%, #8B1A1A 100%);
      border-radius: 1.5rem;
      transform: rotate(5deg);
      z-index: 0;
      box-shadow: 0 20px 50px rgba(192,57,43,.35);
    }

    /* ── White main card ── */
    #login-card {
      position: relative;
      z-index: 1;
      background: #ffffff;
      border-radius: 1.5rem;
      padding: 3.5rem 2.5rem 5.5rem;
      min-height: 560px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 8px 40px rgba(192,57,43,.12), 0 2px 12px rgba(0,0,0,.08);
      border: 1px solid rgba(192,57,43,.10);
      overflow: visible;
    }

    /* ── Logo ── */
    #login-logo-wrap {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid rgba(192,57,43,.20);
      box-shadow: 0 4px 18px rgba(192,57,43,.25);
      overflow: hidden;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #login-logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* ── Welcome heading ── */
    #login-welcome {
      font-size: 1.35rem;
      font-weight: 800;
      color: #8B1A1A;
      margin-bottom: .3rem;
      letter-spacing: -.01em;
    }
    #login-subtitle {
      font-size: .82rem;
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    /* ── Underline inputs ── */
    .login-field {
      display: flex;
      align-items: center;
      gap: .6rem;
      border-bottom: 1.5px solid #e2e8f0;
      margin-bottom: 1.8rem;
      padding-bottom: .4rem;
      transition: border-color .2s;
    }
    .login-field:focus-within {
      border-color: #C0392B;
    }
    .login-field .lf-icon {
      font-size: 1rem;
      color: #C0392B;
      flex-shrink: 0;
    }
    .login-field input {
      flex: 1;
      border: none !important;
      background: transparent !important;
      outline: none !important;
      box-shadow: none !important;
      font-size: .95rem;
      color: #1e293b;
      padding: .3rem 0;
    }
    .login-field input::placeholder { color: #94a3b8; }

    /* ── Error message ── */
    #login-error {
      background: #fee2e2 !important;
      color: #991b1b !important;
      border: none !important;
      border-radius: .5rem !important;
      padding: .5rem .75rem !important;
      font-size: .82rem !important;
      margin-bottom: 1rem !important;
    }

    /* ── LOG IN NOW pill button ── */
    #login-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: transparent;
      border: 2px solid #C0392B;
      border-radius: 999px;
      padding: .7rem 1.25rem .7rem 1.5rem;
      font-size: .9rem;
      font-weight: 700;
      color: #C0392B;
      letter-spacing: .06em;
      cursor: pointer;
      transition: all .2s ease;
      text-transform: uppercase;
    }
    #login-btn .btn-arrow {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: #C0392B;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      color: #fff;
      transition: background .2s;
      flex-shrink: 0;
    }
    #login-btn:hover {
      background: #fdecea !important;
      border-color: #8B1A1A !important;
      color: #8B1A1A !important;
    }
    #login-btn:hover .btn-arrow { background: #8B1A1A; }
    #login-btn:active { transform: scale(.98); }

    /* ── Admin Login badge ── */
    #login-admin-badge {
      position: absolute;
      bottom: -14px;
      right: 24px;
      background: linear-gradient(135deg, #C0392B, #8B1A1A);
      color: #fff;
      font-size: .82rem;
      font-weight: 700;
      padding: .45rem 1.2rem;
      border-radius: 999px;
      box-shadow: 0 4px 14px rgba(192,57,43,.40);
      z-index: 2;
      white-space: nowrap;
    }

    /* ── Mobile responsive ── */
    @media (max-width: 480px) {
      #login-card { padding: 2.5rem 1.5rem 4rem; }
      #login-geo-back { display: none; }
    }
  </style>
</head>
