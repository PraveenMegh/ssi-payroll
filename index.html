<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SSI Inventory</title>
  <link rel="icon" type="image/png" href="assets/ssi-favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--brand:#e11d2e}
    html,body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    .brand{color:var(--brand)}
    .bg-brand{background:var(--brand)}
    .ring-brand{--tw-ring-color:var(--brand)}
    .nav-active{background:rgba(225,29,46,.10);border-left:3px solid var(--brand)}
    .chip{display:inline-flex;align-items:center;gap:.5rem;padding:.25rem .6rem;border-radius:999px;font-size:.75rem;font-weight:600}
    .chip-urgent{background:rgba(225,29,46,.12);color:#b42318}
    .chip-ok{background:rgba(16,185,129,.14);color:#047857}
    .chip-warn{background:rgba(245,158,11,.18);color:#92400e}
  </style>
  <!-- SheetJS for Excel read/write -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="app"></div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/users.js"></script>
  <script src="js/units.js"></script>
  <script src="js/products.js"></script>
  <script src="js/clients.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/sales-orders.js"></script>
  <script src="js/dispatch.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/dashboard.js"></script>

  <script>
    // Boot
    SSIApp.bootstrap();
  </script>
</body>
</html>
