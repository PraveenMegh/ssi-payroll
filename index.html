<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSI Management System - Shree Sai Industries</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        /* Login Page Styling */
        #loginScreen {
            background: #ffffff;
            position: relative;
            overflow: hidden;
        }
        
        .login-container {
            position: relative;
            z-index: 10;
        }
        
        .login-form-wrapper {
            background: #ffffff;
            border: 2px solid #e5e7eb;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }
        
        .login-input {
            transition: all 0.3s ease;
        }
        
        .login-input:focus {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220, 38, 38, 0.2);
        }
        
        .login-btn {
            background: linear-gradient(135deg, #DC2626 0%, #991B1B 100%);
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(220, 38, 38, 0.3);
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(220, 38, 38, 0.4);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .welcome-text {
            color: #1f2937;
        }
        
        /* Sidebar Styling */
        .sidebar-link:hover {
            background-color: #DC2626;
            color: white;
        }
        
        .sidebar-link.active {
            background-color: #991B1B;
            color: white;
        }
        
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                margin: 0;
                padding: 20px;
            }
        }
        
        .table-container {
            overflow-x: auto;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover,
        .close:focus {
            color: black;
        }
        
        .status-urgent {
            background-color: #fecaca;
            color: #991b1b;
        }
        
        .status-pipeline {
            background-color: #dbeafe;
            color: #1e40af;
        }
        
        .status-dispatched {
            background-color: #fef3c7;
            color: #92400e;
        }
        
        .status-invoiced {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .status-cancelled {
            background-color: #f87171;
            color: #7f1d1d;
        }
    </style>
</head>
<body class="bg-white">
    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-white">
        <div class="w-full max-w-md px-8 login-container">
            <!-- Login Form with Logo Inside -->
            <form id="loginForm" class="space-y-6 rounded-2xl p-10 login-form-wrapper">
                <!-- Logo -->
                <div class="text-center mb-8">
                    <img src="https://page.gensparksite.com/v1/base64_upload/9df1f51ca725382bf845fb19357a7ef5" 
                         alt="Shree Sai Industries Logo" 
                         class="mx-auto"
                         style="height: 120px; width: auto;">
                </div>
                
                <!-- Welcome Text -->
                <div class="text-center mb-6">
                    <h2 class="text-3xl font-bold welcome-text mb-2">Welcome Back</h2>
                    <p class="text-gray-600 text-sm">Sign in to continue to SSI Management</p>
                </div>
                
                <!-- Email Input -->
                <div>
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Email Address</label>
                    <input type="text" id="loginUsername" required 
                        class="w-full px-4 py-3.5 border-2 border-gray-200 rounded-xl focus:border-red-500 focus:outline-none text-gray-800 transition-all text-base"
                        placeholder="Enter your email">
                </div>
                
                <!-- Password Input -->
                <div>
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Password</label>
                    <input type="password" id="loginPassword" required 
                        class="w-full px-4 py-3.5 border-2 border-gray-200 rounded-xl focus:border-red-500 focus:outline-none text-gray-800 transition-all text-base"
                        placeholder="Enter your password">
                </div>
                
                <!-- Login Button -->
                <button type="submit" 
                    class="login-btn w-full text-white font-bold py-4 px-6 rounded-xl mt-8 text-base flex items-center justify-center space-x-2">
                    <span>LOG IN NOW</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
                
                <div id="loginError" class="hidden text-red-600 text-sm text-center mt-3 bg-red-50 py-2 px-4 rounded-lg"></div>
            </form>
            
            <!-- Footer Text -->
            <div class="text-center mt-6">
                <p class="text-gray-500 text-sm">© 2024 Shree Sai Industries. All rights reserved.</p>
            </div>
        </div>
    </div>

    <!-- Main Application -->
    <div id="mainApp" class="hidden">
        <!-- Header -->
        <header class="bg-red-600 text-white shadow-lg no-print">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <img src="https://page.gensparksite.com/v1/base64_upload/9df1f51ca725382bf845fb19357a7ef5" alt="SSI Logo" style="height: 50px; width: auto; background: white; padding: 4px; border-radius: 4px;">
                    <div>
                        <h1 class="text-2xl font-bold">SSI Management System</h1>
                        <p class="text-sm text-red-100">Shree Sai Industries</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <p class="font-medium" id="userFullName"></p>
                        <p class="text-sm text-red-100" id="userRole"></p>
                    </div>
                    <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg transition duration-200">
                        <i class="fas fa-sign-out-alt mr-2"></i>Logout
                    </button>
                </div>
            </div>
        </header>

        <div class="flex">
            <!-- Sidebar -->
            <aside id="sidebar" class="w-64 bg-white shadow-lg min-h-screen no-print">
                <nav class="p-4">
                    <div id="sidebarLinks"></div>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 p-6" id="mainContent">
                <!-- Content will be loaded dynamically -->
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/sales.js"></script>
    <script src="js/dispatch.js"></script>
    <script src="js/accounts.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/payroll-schema-fix.js"></script>
    <script src="js/payroll.js"></script>
    <script src="js/payroll-processing.js"></script>
    <script src="js/payroll-reports.js"></script>
    <script src="js/celebrations.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
