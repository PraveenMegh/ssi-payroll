<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSI Management System - Shree Sai Industries</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .sidebar-link:hover {
            background-color: #3b82f6;
            color: white;
        }
        
        .sidebar-link.active {
            background-color: #2563eb;
            color: white;
        }
        
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                margin: 0;
                padding: 20px;
            }
        }
        
        .table-container {
            overflow-x: auto;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .urgent-badge {
            background-color: #ef4444;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-pipeline {
            background-color: #fbbf24;
            color: #92400e;
        }
        
        .status-dispatched {
            background-color: #60a5fa;
            color: #1e3a8a;
        }
        
        .status-invoiced {
            background-color: #34d399;
            color: #065f46;
        }
        
        .status-cancelled {
            background-color: #f87171;
            color: #7f1d1d;
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
        <div class="relative" style="width: 420px; height: 580px;">
            <!-- Login Card Container -->
            <div class="relative overflow-hidden shadow-2xl h-full" style="border-radius: 20px;">
                
                <!-- White Area - Start with 40% at top, smooth U-curve on right -->\n                <div class="absolute inset-0 bg-white z-10" 
                     style="clip-path: polygon(
                         0% 0%,
                         40% 0%,
                         42% 5%,
                         44% 10%,
                         46% 15%,
                         48% 20%,
                         50% 25%,
                         52% 30%,
                         54% 35%,
                         56% 40%,
                         58% 45%,
                         60% 50%,
                         58% 55%,
                         56% 60%,
                         54% 65%,
                         50% 70%,
                         46% 75%,
                         40% 80%,
                         32% 85%,
                         24% 90%,
                         14% 95%,
                         6% 98%,
                         0% 100%,
                         0% 0%
                     );">
                    
                    <!-- Top Red Border -->
                    <div class="h-1.5 bg-red-700"></div>
                    
                    <!-- Content inside white area -->
                    <div class="p-10 h-full flex flex-col">
                        <!-- Logo -->
                        <div class="mb-8 mt-4">
                            <img src="https://page.gensparksite.com/v1/base64_upload/9df1f51ca725382bf845fb19357a7ef5" 
                                 alt="Shree Sai Industries Logo" 
                                 style="height: 80px; width: auto;">
                        </div>
                        
                        <!-- Login Form -->
                        <form id="loginForm" class="space-y-6">
                            <!-- Email Input -->
                            <div>
                                <div class="flex items-start pb-2">
                                    <i class="fas fa-user text-black text-sm mt-1 mr-2"></i>
                                    <div class="flex-1">
                                        <label class="block text-gray-700 text-sm font-medium mb-2">Email</label>
                                        <input type="text" id="loginUsername" required 
                                            class="border-b-2 border-gray-400 focus:border-red-600 focus:outline-none text-gray-800 pb-2 bg-transparent transition-colors" 
                                            style="width: 85%; border-bottom: 2px solid #9CA3AF;">
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Password Input -->
                            <div>
                                <div class="flex items-start pb-2">
                                    <i class="fas fa-lock text-black text-sm mt-1 mr-2"></i>
                                    <div class="flex-1">
                                        <label class="block text-gray-700 text-sm font-medium mb-2">Password</label>
                                        <input type="password" id="loginPassword" required 
                                            class="border-b-2 border-gray-400 focus:border-red-600 focus:outline-none text-gray-800 pb-2 bg-transparent transition-colors" 
                                            style="width: 85%; border-bottom: 2px solid #9CA3AF;">
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Login Button -->
                            <button type="submit" 
                                class="bg-white border-2 border-black text-black py-3 px-6 rounded-full hover:bg-black hover:text-white transition duration-300 font-semibold text-sm flex items-center justify-between group mt-8" 
                                style="width: 85%;">
                                <span>LOG IN NOW</span>
                                <i class="fas fa-chevron-right transform group-hover:translate-x-1 transition-transform"></i>
                            </button>
                            
                            <div id="loginError" class="hidden text-red-600 text-sm text-center mt-3"></div>
                        </form>
                    </div>
                </div>
                
                <!-- Grey Gradient Stripe - Following white U-curve -->\n                <div class="absolute bottom-0 right-0 w-full h-full" 
                     style="background: linear-gradient(135deg, #E5E7EB 0%, #D1D5DB 20%, #9CA3AF 40%, #6B7280 60%, #4B5563 80%, #374151 90%, #1F2937 100%);
                            clip-path: polygon(
                                40% 0%,
                                50% 0%,
                                52% 5%,
                                54% 10%,
                                56% 15%,
                                58% 20%,
                                60% 25%,
                                62% 30%,
                                64% 35%,
                                66% 40%,
                                68% 45%,
                                70% 50%,
                                68% 55%,
                                66% 60%,
                                64% 65%,
                                60% 70%,
                                56% 75%,
                                50% 80%,
                                42% 85%,
                                34% 90%,
                                24% 95%,
                                14% 98%,
                                6% 98%,
                                14% 95%,
                                24% 90%,
                                32% 85%,
                                40% 80%,
                                46% 75%,
                                50% 70%,
                                54% 65%,
                                56% 60%,
                                58% 55%,
                                60% 50%,
                                58% 45%,
                                56% 40%,
                                54% 35%,
                                52% 30%,
                                50% 25%,
                                48% 20%,
                                46% 15%,
                                44% 10%,
                                42% 5%,
                                40% 0%
                            );
                            z-index: 9;">
                </div>
                
                <!-- Black Area - Bottom-right corner, Admin Login badge overlays here -->\n                <div class="absolute bottom-0 right-0 w-full h-full" 
                     style="background: linear-gradient(to top right, #000000 0%, #1a1a1a 40%, #333333 70%, #4d4d4d 100%);
                            clip-path: polygon(
                                50% 0%,
                                100% 0%,
                                100% 100%,
                                14% 98%,
                                24% 95%,
                                34% 90%,
                                42% 85%,
                                50% 80%,
                                56% 75%,
                                60% 70%,
                                64% 65%,
                                66% 60%,
                                68% 55%,
                                70% 50%,
                                68% 45%,
                                66% 40%,
                                64% 35%,
                                62% 30%,
                                60% 25%,
                                58% 20%,
                                56% 15%,
                                54% 10%,
                                52% 5%,
                                50% 0%
                            );
                            z-index: 8;">
                </div>
            </div>
            
            <!-- "Admin Login" Badge (Bottom Right on Red/Orange Background) -->
            <div class="absolute bottom-0 right-0 text-white rounded-tl-3xl shadow-2xl" 
                 style="width: 190px; height: 150px; z-index: 20; background: linear-gradient(135deg, #DC143C 0%, #FF4500 100%); border-top-left-radius: 3rem;">
                <div class="h-full flex items-center justify-center">
                    <div class="text-center leading-tight">
                        <p class="text-4xl font-bold" style="letter-spacing: 0.02em;">Admin</p>
                        <p class="text-4xl font-bold mt-1" style="letter-spacing: 0.02em;">Login</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Application -->
    <div id="mainApp" class="hidden">
        <!-- Header -->
        <header class="bg-blue-600 text-white shadow-lg no-print">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <img src="https://page.gensparksite.com/v1/base64_upload/9df1f51ca725382bf845fb19357a7ef5" alt="SSI Logo" style="height: 50px; width: auto; background: white; padding: 4px; border-radius: 4px;">
                    <div>
                        <h1 class="text-2xl font-bold">SSI Management System</h1>
                        <p class="text-sm text-blue-100">Shree Sai Industries</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <p class="font-medium" id="userFullName"></p>
                        <p class="text-sm text-blue-100" id="userRole"></p>
                    </div>
                    <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg transition duration-200">
                        <i class="fas fa-sign-out-alt mr-2"></i>Logout
                    </button>
                </div>
            </div>
        </header>

        <div class="flex">
            <!-- Sidebar -->
            <aside id="sidebar" class="w-64 bg-white shadow-lg min-h-screen no-print">
                <nav class="p-4">
                    <div id="sidebarLinks"></div>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 p-6" id="mainContent">
                <!-- Content will be loaded dynamically -->
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/sales.js"></script>
    <script src="js/dispatch.js"></script>
    <script src="js/accounts.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/payroll-schema-fix.js"></script>
    <script src="js/payroll.js"></script>
    <script src="js/payroll-processing.js"></script>
    <script src="js/payroll-reports.js"></script>
    <script src="js/celebrations.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
